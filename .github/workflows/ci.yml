name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # Upsert the quality gate + release-path summary comment on the PR.
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # baseline-guard compares the PR's snapshot against origin/main.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo '::error::run gofmt'; exit 1; }
      - name: go vet
        run: go vet ./...
      # Run the Go suite and, in the same pass, capture its verbose output as a
      # real JUnit report the self-gate ingests below. pipefail makes a test
      # failure fail this step (go-junit-report always exits 0), so this stays
      # the authoritative fast-fail while also producing pawl-junit.xml.
      - name: go test (+ JUnit report for the self-gate)
        run: |
          set -o pipefail
          go test -v ./... 2>&1 | go run github.com/jstemmer/go-junit-report/v2@v2.1.0 > pawl-junit.xml
      - name: node distribution tests
        run: node --test npm/cli/test/*.test.js
      # The setup-pawl action renders its PR comment from a pawl --format json
      # verdict via scripts/render-comment.mjs; unit-test that rendering here.
      - name: node action-script tests
        run: node --test scripts/*.test.mjs
      # pawl gates its own Go source (dogfooding — the self-closed loop).
      - name: Build pawl
        run: go build -o /tmp/pawl ./cmd/pawl
      - name: Self-check (pawl on pawl)
        run: |
          set -o pipefail
          /tmp/pawl check | tee /tmp/pawl-check.txt
      # Dogfood --format codeclimate: the findings array must be valid JSON on
      # every PR, so a break in the Code Quality output path fails here.
      - name: Self-check (codeclimate findings are valid JSON)
        run: |
          /tmp/pawl check --format codeclimate | node -e 'const a=JSON.parse(require("fs").readFileSync(0,"utf8"));if(!Array.isArray(a))throw new Error("codeclimate output is not an array");console.log(a.length+" codeclimate finding(s)")'
      - name: Guard pawl's own baseline
        if: github.event_name == 'pull_request'
        run: /tmp/pawl baseline-guard origin/main
      # Dogfood --since: scope the gate to lines changed since the PR base, so
      # the diff-scoping path (git diff + added-line attribution) runs on every
      # PR. pawl's own baseline is clean, so this passes — it exercises the code.
      - name: Self-check (diff-scoped, dogfoods --since)
        if: github.event_name == 'pull_request'
        run: /tmp/pawl check --since origin/main
      # Validate the whole release path on the PR — a publish-time break
      # (e.g. a non-package dir under dist/) then fails here, before merge,
      # instead of on the release run after it.
      - name: Validate npm release path (build + dry-run publish)
        id: releasepath
        if: github.event_name == 'pull_request'
        run: |
          PAWL_ARCHIVES=1 node npm/build.js
          PAWL_DRY_RUN=1 node npm/publish.js
      - name: Comment quality gate + release-path summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RELEASE_OUTCOME: ${{ steps.releasepath.outcome }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pawl-ci -->';
            const table = fs.existsSync('/tmp/pawl-check.txt')
              ? fs.readFileSync('/tmp/pawl-check.txt', 'utf8').trim()
              : '(self-check produced no output)';
            const outcome = process.env.RELEASE_OUTCOME;
            const releaseLine =
              outcome === 'success' ? '✅ npm release path validated (build + dry-run publish)'
              : outcome === 'failure' ? '❌ npm release path is broken — a real publish would fail'
              : `⏭️ npm release path not validated (${outcome || 'skipped'})`;
            const body = [
              marker,
              `## pawl CI · \`${context.sha.slice(0, 7)}\``,
              '',
              '### Quality gate (pawl on pawl)',
              '```',
              table,
              '```',
              '',
              releaseLine,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Dogfood the published GitHub Action: install pawl through `uses: ./` on each
  # supported runner OS and confirm the binary lands on PATH. This gates the
  # action definition itself — a broken OS/arch case or download path fails here,
  # on the PR, instead of in a consumer's workflow. It installs the latest
  # release (not the PR's build), so it verifies the action, not the PR's pawl.
  action-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pawl via its own action
        uses: ./
      - name: Confirm pawl is on PATH
        run: pawl version
      # Dogfood the command wiring (install → run gate → capture json → enforce
      # verdict) on each OS. comment is off so pawl's own PRs don't race on a
      # sticky comment; the comment renderer is unit-tested separately, and the
      # live upsert path is exercised by downstream consumers. pawl's baseline is
      # clean, so the enforced verdict is 0 and this step passes.
      # Point the released binary at pawl.smoke.yaml (primitives only, so any
      # release can run it) rather than pawl.yaml, whose junit dimensions need
      # a builtin the released pawl may not have yet. This keeps action-smoke a
      # test of the action's wiring, decoupled from pawl.yaml's builtin set.
      - name: Dogfood the action's command mode
        uses: ./
        with:
          command: check
          args: '-c pawl.smoke.yaml'
          comment: 'false'
