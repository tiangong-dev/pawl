name: 'setup-pawl'
description: 'Install the pawl quality gate and put it on PATH (prebuilt binary, no Go or Node required).'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  version:
    description: 'Release to install: a tag like v0.1.0, or "latest".'
    required: false
    default: 'latest'
  command:
    description: >-
      Optional pawl command to run after install (e.g. "check"). Left empty,
      the action only installs the binary. Any pre-steps the command needs
      (building exec adapters, etc.) run as ordinary earlier workflow steps.
    required: false
    default: ''
  args:
    description: 'Extra arguments for the command, e.g. "--since origin/main".'
    required: false
    default: ''
  comment:
    description: >-
      On a pull_request event, upsert a sticky comment with the gate result
      (rendered from the command''s --format json verdict). Default true; set
      "false" to disable.
    required: false
    default: 'true'
  token:
    description: 'Token used to post the PR comment. Defaults to the workflow token.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install pawl
      shell: bash
      env:
        PAWL_VERSION: ${{ inputs.version }}
        # Authenticated API calls avoid the unauthenticated rate limit when
        # resolving "latest"; github.token is always available in a workflow.
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          Linux)   plat=linux;  ext=tar.gz; bin=pawl ;;
          macOS)   plat=darwin; ext=tar.gz; bin=pawl ;;
          Windows) plat=win32;  ext=zip;    bin=pawl.exe ;;
          *) echo "::error::setup-pawl: unsupported runner OS '$RUNNER_OS'"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=x64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::setup-pawl: unsupported runner arch '$RUNNER_ARCH'"; exit 1 ;;
        esac

        ver="$PAWL_VERSION"
        if [ "$ver" = latest ]; then
          ver="$(gh release view --repo tiangong-dev/pawl --json tagName --jq .tagName)"
        fi
        num="${ver#v}"
        asset="pawl-${num}-${plat}-${arch}.${ext}"
        url="https://github.com/tiangong-dev/pawl/releases/download/${ver}/${asset}"

        dest="${RUNNER_TEMP}/pawl-bin"
        mkdir -p "$dest"
        echo "setup-pawl: downloading $asset ($ver)"
        curl -fsSL "$url" -o "${RUNNER_TEMP}/${asset}"
        if [ "$ext" = zip ]; then
          unzip -oq "${RUNNER_TEMP}/${asset}" -d "$dest"
        else
          tar -xzf "${RUNNER_TEMP}/${asset}" -C "$dest"
        fi
        chmod +x "${dest}/${bin}" 2>/dev/null || true
        echo "$dest" >> "$GITHUB_PATH"
        echo "setup-pawl: installed pawl $ver to $dest"

    # Run the gate but capture its exit code instead of failing here, so the
    # comment step still runs on a regression. The verdict is enforced last.
    - name: Run pawl
      id: gate
      if: inputs.command != ''
      shell: bash
      env:
        PAWL_COMMAND: ${{ inputs.command }}
        PAWL_ARGS: ${{ inputs.args }}
      run: |
        set -uo pipefail
        report="${RUNNER_TEMP}/pawl-report.json"
        code=0
        # $PAWL_ARGS is intentionally unquoted so multi-word args word-split.
        pawl "$PAWL_COMMAND" --format json $PAWL_ARGS > "$report" || code=$?
        echo "report=$report" >> "$GITHUB_OUTPUT"
        echo "code=$code" >> "$GITHUB_OUTPUT"
        # Mirror the verdict to the log so a failing run still shows it.
        cat "$report" || true

    - name: Upsert PR comment
      if: ${{ inputs.command != '' && inputs.comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token || github.token }}
        PAWL_REPORT: ${{ steps.gate.outputs.report }}
      # The comment is auxiliary — a startup failure (missing node, bad script)
      # must never fail the job and mask the gate verdict enforced next.
      run: |
        node "$GITHUB_ACTION_PATH/scripts/pr-comment.mjs" || echo "::warning::pawl: PR comment step failed to run"

    - name: Enforce gate verdict
      if: inputs.command != ''
      shell: bash
      env:
        PAWL_CODE: ${{ steps.gate.outputs.code }}
      run: exit "$PAWL_CODE"
