# pawl gates its own Go source — the gate dogfoods itself in CI (`pawl check`
# runs in .github/workflows/ci.yml). The structural dimensions use only built-in
# primitives plus a POSIX-grep exec adapter (the extract layer). The `junit`
# dimensions make pawl the first real consumer of its own report-ingest tier:
# they read the actual go-junit-report output CI produces from `go test`, so the
# ingest path runs on genuine tool output, not a fixture.
snapshot: "pawl.snapshot.json"

dimensions:
  - id: "file-length"
    title: "Go files over 500 lines"
    direction: "lower-is-better"
    gate: "total"
    builtin: "file-length"
    options:
      threshold: 500
      include: ["**/*.go"]

  # pawl reports failures as error returns, never panics; the one legitimate
  # invariant panic (json.Marshal of a string) holds the baseline at 1.
  - id: "panics"
    title: "panic() calls in non-test code"
    direction: "lower-is-better"
    gate: "per-file-count"
    builtin: "pattern-count"
    options:
      pattern: 'panic\('
      include: ["**/*.go"]
      exclude: ["**/*_test.go"]

  - id: "todo-markers"
    title: "TODO / FIXME markers"
    direction: "lower-is-better"
    gate: "per-file-count"
    builtin: "pattern-count"
    options:
      pattern: 'TODO|FIXME'
      include: ["**/*.go"]

  # An exec adapter dogfooding the declarative `extract` layer: no wrapper
  # script, just a POSIX grep whose `path:line` output the regex turns into a
  # per-file-count breakdown. Guards an architectural invariant — pawl writes
  # through the injected io.Writer, so a bare fmt.Print* to stdout (which bypasses
  # testable output) must not creep in. Baseline is 0.
  - id: "stray-prints"
    title: "Bare fmt.Print* (write via the injected io.Writer instead)"
    direction: "lower-is-better"
    gate: "per-file-count"
    command: "grep -rnE 'fmt\\.Print(ln|f)?\\(' internal cmd --include='*.go' | grep -v _test.go || true"
    extract:
      regex: '^(?P<path>[^:]+):(?P<line>\d+):'

  # Report-ingest dogfood: both dimensions read pawl-junit.xml — the real JUnit
  # report CI generates by piping `go test -v ./...` through go-junit-report.
  # The producer's own exit code is deliberately ignored (per the ingest
  # contract); the gate is that a parseable report exists.

  # A passing-test floor: deleting a test drops the count and regresses. New
  # tests raise it — re-record to lock the higher floor in.
  - id: "passing-tests"
    title: "passing Go tests"
    direction: "higher-is-better"
    gate: "total"
    builtin: "junit"
    options:
      file: "pawl-junit.xml"
      count: "passing"

  # A failing-test ceiling held at 0. `go test` already fails CI on a failure;
  # this reads the same fact through the ingest path so a break there surfaces
  # as a gate regression too.
  - id: "test-failures"
    title: "failing Go tests"
    direction: "lower-is-better"
    gate: "total"
    builtin: "junit"
    options:
      file: "pawl-junit.xml"
      count: "failures"
