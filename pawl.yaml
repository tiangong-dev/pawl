# pawl gates its own Go source — the gate dogfoods itself in CI (`pawl check`
# runs in .github/workflows/ci.yml). Zero external dependencies (built-in
# primitives plus a POSIX-grep exec adapter that dogfoods the extract layer), so
# the self-check needs nothing but the repo, matching pawl's self-contained ethos.
snapshot: "pawl.snapshot.json"

dimensions:
  - id: "file-length"
    title: "Go files over 500 lines"
    direction: "lower-is-better"
    gate: "total"
    builtin: "file-length"
    options:
      threshold: 500
      include: ["**/*.go"]

  # pawl reports failures as error returns, never panics; the one legitimate
  # invariant panic (json.Marshal of a string) holds the baseline at 1.
  - id: "panics"
    title: "panic() calls in non-test code"
    direction: "lower-is-better"
    gate: "per-file-count"
    builtin: "pattern-count"
    options:
      pattern: 'panic\('
      include: ["**/*.go"]
      exclude: ["**/*_test.go"]

  - id: "todo-markers"
    title: "TODO / FIXME markers"
    direction: "lower-is-better"
    gate: "per-file-count"
    builtin: "pattern-count"
    options:
      pattern: 'TODO|FIXME'
      include: ["**/*.go"]

  # An exec adapter dogfooding the declarative `extract` layer: no wrapper
  # script, just a POSIX grep whose `path:line` output the regex turns into a
  # per-file-count breakdown. Guards an architectural invariant — pawl writes
  # through the injected io.Writer, so a bare fmt.Print* to stdout (which bypasses
  # testable output) must not creep in. Baseline is 0.
  - id: "stray-prints"
    title: "Bare fmt.Print* (write via the injected io.Writer instead)"
    direction: "lower-is-better"
    gate: "per-file-count"
    command: "grep -rnE 'fmt\\.Print(ln|f)?\\(' internal cmd --include='*.go' | grep -v _test.go || true"
    extract:
      regex: '^(?P<path>[^:]+):(?P<line>\d+):'
